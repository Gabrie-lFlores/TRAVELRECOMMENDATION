    <link rel="stylesheet" href="travel_recommendation.css">
</head>
<body>
    <div id="divHeader">
         <p>TravelRec</p>
        <div id="divNav">
            <a href="./travel_recommendation.html">Home </a>

        </div>

            <a href="https://www.twitter.com/TravelRec" target="_blank"><img src="./images/twitter.jpeg" alt="Twitter" width="30" height="30"></a>

        <div id="Formulario">
            <h2 style="font-size: 60px; color:white">Contact Us</h2>
            <form>

                <label for="name">Name:</label>

                <label for="email">Email:</label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

            </form>
        </div>
